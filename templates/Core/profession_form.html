{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="bi bi-briefcase me-2"></i>{{ title }}</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="{{ form.name.id_for_label }}" class="form-label">
                                <i class="bi bi-type me-1"></i>Profession Name
                            </label>
                            {{ form.name.errors }}
                            <input type="text" name="{{ form.name.name }}" 
                                   value="{{ form.name.value|default:'' }}"
                                   class="form-control" id="{{ form.name.id_for_label }}" 
                                   placeholder="Enter profession name" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="{{ form.name_ar.id_for_label }}" class="form-label">
                                <i class="bi bi-translate me-1"></i>Arabic Name
                            </label>
                            {{ form.name_ar.errors }}
                            <input type="text" name="{{ form.name_ar.name }}" 
                                   value="{{ form.name_ar.value|default:'' }}"
                                   class="form-control" id="{{ form.name_ar.id_for_label }}" 
                                   placeholder="Enter Arabic name" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="{{ form.fee_value.id_for_label }}" class="form-label">
                                <i class="bi bi-cash me-1"></i>Fee Value
                            </label>
                            {{ form.fee_value.errors }}
                            <input type="number" name="{{ form.fee_value.name }}" 
                                   value="{{ form.fee_value.value|default:'' }}"
                                   class="form-control" id="{{ form.fee_value.id_for_label }}" 
                                   placeholder="Enter fee value" step="0.01" required>
                        </div>
                        
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'profession_list' %}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left me-1"></i>Back
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save me-1"></i>Save
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
