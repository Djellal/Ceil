{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0"><i class="bi bi-geo-alt-fill me-2"></i>{{ title }}</h4>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="{{ form.name.id_for_label }}" class="form-label">State Name</label>
                    {{ form.name.errors }}
                    {{ form.name }}
                </div>
                
                <div class="mb-3">
                    <label for="{{ form.name_ar.id_for_label }}" class="form-label">Arabic State Name</label>
                    {{ form.name_ar.errors }}
                    {{ form.name_ar }}
                </div>
                
                <div class="d-flex justify-content-between">
                    <a href="{% url 'state_list' %}" class="btn btn-secondary">
                        <i class="bi bi-arrow-left me-1"></i>Back to List
                    </a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save me-1"></i>Save
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
