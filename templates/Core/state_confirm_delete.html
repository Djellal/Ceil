{% extends "base.html" %}

{% block title %}Delete State{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="card shadow">
        <div class="card-header bg-danger text-white">
            <h4 class="mb-0"><i class="bi bi-exclamation-triangle-fill me-2"></i>Delete State</h4>
        </div>
        <div class="card-body">
            <p class="alert alert-warning">
                <i class="bi bi-exclamation-triangle me-2"></i>
                Are you sure you want to delete the state <strong>"{{ state.name }}"</strong>?
                This will also delete all municipalities associated with this state.
            </p>
            
            <form method="post">
                {% csrf_token %}
                <div class="d-flex justify-content-between">
                    <a href="{% url 'state_list' %}" class="btn btn-secondary">
                        <i class="bi bi-x-circle me-1"></i>Cancel
                    </a>
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash me-1"></i>Delete
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
